plugins {
    id "com.android.application"
}

android {
    namespace "com.mn.animat3d"
    compileSdk 35

    defaultConfig {
        applicationId "com.mn.animat3d"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}
